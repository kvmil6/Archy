name: CI

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    branches:
      - dev
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  branch-policy:
    name: Enforce Branch Flow
    runs-on: ubuntu-latest
    steps:
      - name: Allow only dev -> main release PRs
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.base_ref }}" == "main" && "${{ github.head_ref }}" != "dev" ]]; then
            echo "::error::Only pull requests from 'dev' can target 'main'."
            exit 1
          fi

  backend-validate:
    name: Backend Validate
    runs-on: ubuntu-latest
    needs: branch-policy
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Compile backend code
        run: python -m compileall app

      - name: Run backend tests
        run: |
          set +e
          pytest -q
          status=$?
          set -e

          if [ "$status" -ne 0 ] && [ "$status" -ne 5 ]; then
            echo "pytest failed with status $status"
            exit "$status"
          fi

          if [ "$status" -eq 5 ]; then
            echo "No backend tests were collected."
          fi

  frontend-validate:
    name: Frontend Validate
    runs-on: ubuntu-latest
    needs: branch-policy
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  security-checks:
    name: Security Guardrails
    runs-on: ubuntu-latest
    needs: branch-policy
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Audit backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit frontend dependencies
        run: |
          npm ci --prefix frontend
          npm audit --prefix frontend --omit=dev --audit-level=high
